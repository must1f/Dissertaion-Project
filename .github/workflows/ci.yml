name: CI

on:
  push:
    branches: [ main, claude/* ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Docker image
      run: |
        docker build -t pinn-test:latest .

    - name: Run tests in Docker
      run: |
        docker run --rm pinn-test:latest pytest tests/ -v --tb=short

    - name: Lint with flake8 in Docker
      run: |
        docker run --rm pinn-test:latest bash -c "flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics && flake8 src/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics"
      continue-on-error: true
