name: CI

on:
  push:
    branches: [ main, claude/* ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: '3.10'

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff black

      - name: Run Ruff linter
        run: |
          ruff check src backend scripts tests --output-format=github
        continue-on-error: true

      - name: Check Black formatting
        run: |
          black --check --diff src/ backend/ scripts/ tests/
        continue-on-error: true

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-xdist

          # Install PyTorch CPU version
          pip install torch --index-url https://download.pytorch.org/whl/cpu

          # pandas-ta from GitHub for stability
          pip install git+https://github.com/twopirllc/pandas-ta.git@0.3.14b0

          # Install project dependencies
          pip install -r requirements.txt --extra-index-url https://pypi.org/simple

      - name: Run unit tests
        run: |
          pytest tests/ -v --tb=short -x --ignore=tests/integration/

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=src --cov-report=xml --cov-report=term-missing
        continue-on-error: true

      - name: Upload coverage report
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        continue-on-error: true

  type-check:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mypy types-PyYAML types-requests
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt --extra-index-url https://pypi.org/simple
        continue-on-error: true

      - name: Run mypy
        run: |
          mypy src/ backend/ scripts/ --config-file pyproject.toml --no-error-summary
        continue-on-error: true

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install bandit
        run: |
          pip install bandit

      - name: Run security scan
        run: |
          bandit -r src/ -ll --skip B101,B311
        continue-on-error: true

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt --extra-index-url https://pypi.org/simple

      - name: Verify imports
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')

          # Test core imports
          from src.data import DataFetcher, DataPreprocessor, DataCleaner
          from src.models import ModelRegistry
          from src.training import Trainer, AdaptiveLossWeighter, CurriculumScheduler
          from src.evaluation import EvaluationHarness, StatisticalTests, StressTestEvaluator
          from src.trading import StrategyEvaluator, BenchmarkEvaluator
          from src.reporting import PlotGenerator, ReportGenerator

          print('All core imports successful!')
          "

      - name: Verify model creation
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          import torch
          from pathlib import Path
          from src.models.model_registry import ModelRegistry

          registry = ModelRegistry(Path('.'))
          test_input = torch.randn(2, 30, 5)

          # Test basic models
          for model_type in ['lstm', 'gru', 'transformer']:
              model = registry.create_model(model_type, input_dim=5)
              if model:
                  out = model(test_input)
                  print(f'✓ {model_type}: OK')
              else:
                  print(f'✗ {model_type}: FAILED')

          print('Model verification complete!')
          "
