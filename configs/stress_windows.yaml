volatility_regimes:
  low: 0.15      # annualized vol threshold
  medium: 0.25
  high: 1.0

notes: |
  This file is a seed list. Extend with Fed meetings, earnings seasons, and
  asset-specific shocks as needed for regime/stress evaluation.
