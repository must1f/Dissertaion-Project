    start: "2008-09-01"
    end: "2009-03-31"
    type: "crisis"
  - name: "COVID_crash"
    start: "2020-02-15"
    end: "2020-04-15"
    type: "crisis"
  - name: "Inflation_peak"
    start: "2022-06-01"
    end: "2022-10-15"
    type: "macro"
  - name: "SVB_shock"
    start: "2023-03-08"
    end: "2023-03-31"
