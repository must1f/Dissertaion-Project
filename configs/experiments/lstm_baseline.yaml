# LSTM Baseline Experiment Configuration
# Standard LSTM model for time series forecasting

name: lstm_baseline
description: LSTM baseline model for financial forecasting
version: "1.0.0"
author: ""

# Model Configuration
model:
  model_type: lstm
  input_dim: 5
  hidden_size: 128
  num_layers: 2
  dropout: 0.2
  bidirectional: false

# Training Configuration
training:
  epochs: 100
  batch_size: 32
  learning_rate: 0.001
  weight_decay: 0.00001
  optimizer: adam
  scheduler: plateau
  scheduler_patience: 10
  scheduler_factor: 0.5
  scheduler_min_lr: 0.000001
  early_stopping: true
  early_stopping_patience: 20
  early_stopping_min_delta: 0.000001
  gradient_clip_norm: 1.0

# Data Configuration
data:
  tickers:
    - AAPL
    - MSFT
    - GOOGL
  start_date: "2015-01-01"
  end_date: "2024-01-01"
  sequence_length: 30
  forecast_horizon: 1
  feature_columns:
    - close
    - volume
    - log_return
    - rolling_volatility_20
    - rsi_14
  target_column: close
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  normalization: standard
  window_strategy: expanding
  n_folds: 5

# Evaluation Configuration
evaluation:
  compute_rolling_metrics: true
  rolling_window_size: 63
  transaction_cost: 0.003
  risk_free_rate: 0.02
  bootstrap_samples: 1000
  confidence_level: 0.95
  n_seeds: 5
  analyze_regimes: true
  volatility_thresholds:
    - 0.15
    - 0.25

# Reproducibility
seed: 42
deterministic: true

# Output
output_dir: outputs/lstm_baseline
save_checkpoints: true
save_predictions: true
log_level: INFO
