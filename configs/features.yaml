# Feature Registry Configuration
#
# This file defines all features used in the PINN financial forecasting system.
# Each feature includes provenance information for reproducibility and auditing.
#
# IMPORTANT: Features with negative lag are target variables and must NEVER be used as inputs.

version: "1.0"
created_at: "2024-12-01"
description: "Feature definitions for PINN financial forecasting"

# Feature groups for easy selection in experiments
feature_groups:
  price_features:
    description: "Raw OHLCV price data"
    features:
      - open
      - high
      - low
      - close
      - volume

  return_features:
    description: "Return-based features"
    features:
      - log_return
      - simple_return

  volatility_features:
    description: "Rolling volatility measures"
    features:
      - rolling_volatility_5
      - rolling_volatility_20
      - rolling_volatility_60

  momentum_features:
    description: "Momentum and trend indicators"
    features:
      - momentum_5
      - momentum_10
      - momentum_20
      - momentum_60
      - sma_5
      - sma_10
      - sma_20
      - sma_60

  technical_indicators:
    description: "Technical analysis indicators"
    features:
      - rsi_14
      - macd
      - macd_signal
      - macd_hist
      - bollinger_upper
      - bollinger_middle
      - bollinger_lower
      - atr_14
      - obv
      - stoch_k
      - stoch_d

  targets:
    description: "Prediction targets - NEVER use as inputs"
    features:
      - target_price
      - target_return
      - target_direction

# Default feature sets for different model types
default_feature_sets:
  baseline:
    description: "Minimal feature set for baseline models"
    features:
      - close
      - volume
      - log_return
      - rolling_volatility_20
      - momentum_20
      - rsi_14
      - macd
      - bollinger_upper
      - bollinger_lower
      - atr_14

  full:
    description: "Complete feature set for production models"
    features:
      - close
      - high
      - low
      - volume
      - log_return
      - simple_return
      - rolling_volatility_5
      - rolling_volatility_20
      - rolling_volatility_60
      - momentum_5
      - momentum_10
      - momentum_20
      - momentum_60
      - sma_5
      - sma_20
      - sma_60
      - rsi_14
      - macd
      - macd_signal
      - macd_hist
      - bollinger_upper
      - bollinger_middle
      - bollinger_lower
      - atr_14
      - obv
      - stoch_k
      - stoch_d

  pinn_optimized:
    description: "Feature set optimized for PINN models"
    features:
      - close
      - log_return
      - rolling_volatility_5
      - rolling_volatility_20
      - momentum_5
      - momentum_20
      - rsi_14
      - macd
      - bollinger_upper
      - bollinger_lower
      - atr_14
    notes: |
      Selected features that align with physics constraints:
      - Volatility features for GBM sigma estimation
      - Momentum for drift (mu) estimation
      - RSI/MACD for mean-reversion (OU) signals

# Additional custom features (extend the built-in registry)
custom_features:
  # Example: VIX-based features for volatility regime
  vix:
    description: "CBOE Volatility Index"
    feature_type: "macro"
    data_source: "yahoo_finance"
    availability: "end_of_day"
    availability_time: "16:15"
    unit: "percent"
    range_min: 0
    range_max: 100
    lag: 0
    notes: "Implied volatility from S&P 500 options"

  vix_sma_20:
    description: "20-day SMA of VIX"
    feature_type: "derived"
    data_source: "computed"
    formula: "vix.rolling(20).mean()"
    dependencies:
      - vix
    lag: 20
    availability: "end_of_day"
    unit: "percent"

  volatility_regime:
    description: "Volatility regime indicator (VIX vs SMA)"
    feature_type: "derived"
    data_source: "computed"
    formula: "(vix > vix_sma_20).astype(int)"
    dependencies:
      - vix
      - vix_sma_20
    lag: 20
    availability: "end_of_day"
    unit: "binary"
    range_min: 0
    range_max: 1
    notes: "1 = high volatility regime, 0 = low volatility regime"

# Feature preprocessing rules
preprocessing:
  # Features to standardize (z-score normalization)
  standardize:
    - log_return
    - simple_return
    - momentum_5
    - momentum_10
    - momentum_20
    - momentum_60
    - macd
    - macd_signal
    - macd_hist

  # Features to scale to [0, 1]
  minmax_scale:
    - rsi_14
    - stoch_k
    - stoch_d

  # Features to log-transform before standardization
  log_transform:
    - volume
    - atr_14

  # Features that should NOT be normalized
  no_normalize:
    - close  # Keep raw for price prediction
    - high
    - low
    - open

# Validation rules
validation:
  # Minimum required lag for input features
  min_input_lag: 0

  # Maximum allowed missing ratio before warning
  max_missing_ratio: 0.05

  # Features that must always be present
  required_features:
    - close
    - log_return

  # Features that should never be used together (multicollinearity)
  mutually_exclusive:
    - [bollinger_upper, bollinger_middle, bollinger_lower]  # Use only upper/lower
    - [momentum_5, momentum_10]  # Highly correlated
